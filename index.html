<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/Weather-App/assets/index-DdQAUq_Q.js"></script>
    <link rel="stylesheet" crossorigin href="/Weather-App/assets/index-BSSKG_NW.css">
  </head>
  <body>
    <main>
      <div class="search-area">
        <span class="app-label">Weather</span>
        <div class="search-row">
          <input
            type="text"
            spellcheck="false"
            placeholder="Enter city name..."
            class="search-bar"
          />
          <button type="button" class="search-btn" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
        </div>
        <span class="error-msg">City not found — try again</span>
      </div>
      <div class="card-one">
        <div class="location row">
          <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16" height="0.85em" width="0.85em" xmlns="http://www.w3.org/2000/svg">
            <path
              fill-rule="evenodd"
              d="M8 16s6-5.686 6-10A6 6 0 002 6c0 4.314 6 10 6 10zm0-7a3 3 0 100-6 3 3 0 000 6z"
              clip-rule="evenodd"
            ></path>
          </svg>
          <p class="city"></p>
        </div>
        <div class="date">
          <p class="current-date"></p>
          <p class="weekday"></p>
        </div>
        <div class="weather">
          <p class="temp"></p>
          <div class="weather-meta">
            <img class="icon" src="" alt="" />
            <p id="description"></p>
          </div>
        </div>
        <p class="feelsLike"></p>
        <div class="grid">
          <div class="details-item">
            <div class="details">
              <p class="par-value" id="min-max"></p>
              <p class="par-name">Min / Max</p>
            </div>
          </div>
          <div class="details-item">
            <div class="details">
              <p class="par-value" id="wind"></p>
              <p class="par-name">Wind speed</p>
            </div>
          </div>
          <div class="details-item">
            <div class="details">
              <p class="par-value" id="humidity"></p>
              <p class="par-name">Humidity</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
